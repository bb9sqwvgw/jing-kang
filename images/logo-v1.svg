<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d9a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1b4d3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3c34;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆形底色 -->
  <circle cx="250" cy="250" r="220" fill="#f8f7f4" stroke="#e0dcd5" stroke-width="2"/>

  <!-- 房屋 + 叶片图标 -->
  <!-- 房屋主体 -->
  <path d="M160 280 L160 380 L340 380 L340 280" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linejoin="round"/>
  <!-- 屋顶 -->
  <path d="M120 280 L250 170 L380 280" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linejoin="round"/>
  <!-- 烟囱/清洁 -->
  <path d="M300 210 L300 170 L320 170 L320 200" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linejoin="round"/>
  <!-- 门 -->
  <rect x="225" y="310" width="50" height="70" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- 叶片 - 代表自然/清洁 -->
  <g transform="translate(340, 170) rotate(30)">
    <path d="M0 0 C15 -20, 30 -25, 40 -15 C30 -5, 15 0, 0 0 Z" fill="url(#goldGrad)" opacity="0.8"/>
  </g>

  <!-- 底部文字 -->
  <text x="250" y="460" text-anchor="middle" font-family="serif" font-size="32" font-weight="700" fill="#1a3c34" letter-spacing="6">静康享宁</text>
  <text x="250" y="492" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6b6560" letter-spacing="4">家政服务</text>
</svg>
