<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#d4b96a"/>
    </linearGradient>
  </defs>

  <!-- 盾牌外形 -->
  <path d="M250 60 L410 110 L410 300 C410 380, 330 440, 250 460 C170 440, 90 380, 90 300 L90 110 Z"
        fill="#1a3c34" stroke="url(#g2)" stroke-width="5"/>

  <!-- 房屋剪影 -->
  <path d="M170 280 L170 360 L330 360 L330 280" fill="none" stroke="url(#g2)" stroke-width="6" stroke-linejoin="round"/>
  <path d="M140 280 L250 185 L360 280" fill="none" stroke="url(#g2)" stroke-width="6" stroke-linejoin="round"/>

  <!-- 十字/星芒 - 代表医疗级清洁 -->
  <g transform="translate(250, 150)">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="url(#g2)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="url(#g2)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 文字 -->
  <text x="250" y="445" text-anchor="middle" font-family="serif" font-size="28" font-weight="700" fill="#1a3c34" letter-spacing="4">静康享宁家政</text>
</svg>
