<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#f0e6c8"/>
    </linearGradient>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b4d3e"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形底 -->
  <rect x="60" y="60" width="380" height="380" rx="60" fill="url(#bg3)"/>

  <!-- 装饰圆环 -->
  <circle cx="250" cy="200" r="85" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="2"/>
  <circle cx="250" cy="200" r="70" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>

  <!-- 房屋图标 -->
  <!-- 屋顶 -->
  <path d="M190 190 L250 135 L310 190" fill="none" stroke="url(#g3)" stroke-width="5" stroke-linejoin="round"/>
  <!-- 屋身 -->
  <rect x="200" y="190" width="100" height="80" rx="4" fill="none" stroke="url(#g3)" stroke-width="5"/>
  <!-- 门 -->
  <rect x="235" y="218" width="30" height="52" rx="3" fill="none" stroke="url(#g3)" stroke-width="3"/>
  <!-- 窗户 -->
  <rect x="215" y="205" width="16" height="16" rx="2" fill="none" stroke="url(#g3)" stroke-width="2.5"/>
  <rect x="269" y="205" width="16" height="16" rx="2" fill="none" stroke="url(#g3)" stroke-width="2.5"/>

  <!-- 三颗星 - 洁净度 -->
  <g fill="url(#g3)">
    <polygon points="190,120 193,128 202,128 195,133 198,141 190,136 182,141 185,133 178,128 187,128"/>
    <polygon points="250,110 253,118 262,118 255,123 258,131 250,126 242,131 245,123 238,118 247,118"/>
    <polygon points="310,120 313,128 322,128 315,133 318,141 310,136 302,141 305,133 298,128 307,128"/>
  </g>

  <!-- 品牌文字 -->
  <text x="250" y="340" text-anchor="middle" font-family="serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="8">静康享宁</text>
  <text x="250" y="380" text-anchor="middle" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.6)" letter-spacing="6">JING KANG XIANG NING</text>
  <text x="250" y="415" text-anchor="middle" font-family="sans-serif" font-size="14" fill="rgba(201,168,76,0.85)" letter-spacing="4">家政服务</text>
</svg>
